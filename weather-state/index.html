<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
        />
        <link rel="stylesheet" href="weather-style.css" />
    </head>
    <body>
        <div class="container">
            <div class="app-container">
                <div class="app-top-bar">
                    <button class="button button-small">
                        <i class="fa fa-chevron-left"></i>
                    </button>
                    <h1 class="app-heading">Weather Stats</h1>
                </div>
                <div class="app-content">
                    <button class="button button-block">
                        <span class="subtle">Period</span>
                        <span>Last 3 days</span>
                        <div class="button button-small">
                            <i class="fa fa-chevron-right"></i>
                        </div>
                    </button>
                    <div class="button button-dial">
                        <span class="button-dial-spoke"></span>
                        <span class="button-dial-spoke"></span>
                        <span class="button-dial-spoke"></span>
                        <span class="button-dial-spoke"></span>
                        <span class="button-dial-spoke"></span>
                        <span class="button-dial-spoke"></span>
                        <div class="button-dial-top"></div>
                        <div class="button-dial-label">
                            <img
                                src="https://www.svgrepo.com/show/236207/thermometer-temperature.svg"
                                alt="thermometer"
                            />
                            7&deg;F
                        </div>
                    </div>
                    <div class="flex-button-container">
                        <button class="button button-large">
                            <img
                                src="https://svgsilh.com/svg/558013-03a9f4.svg"
                                alt="ice"
                            />
                            Cool
                        </button>
                        <button class="button button-large">
                            <img
                                src="https://svgsilh.com/svg/1294356-ff5722.svg"
                                alt="fire"
                            />
                            Warm
                        </button>
                    </div>
                    <button class="button button-link">Updating Setting</button>
                </div>
            </div>
        </div>
    </body>
</html>
